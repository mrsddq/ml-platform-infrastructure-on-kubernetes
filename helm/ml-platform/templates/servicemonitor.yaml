{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Chart.Name }}-api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}-api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
{{- end }}
